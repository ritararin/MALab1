<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Audio Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #cfd8dc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.player-container {
    background: #d7dee3;
    padding: 30px;
    border-radius: 20px;
    width: 700px;
}

h1 {
    margin: 0;
}

.subtitle {
    color: #555;
    margin-bottom: 30px;
}

.top {
    display: flex;
    align-items: center;
    gap: 20px;
}

.play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #e8f5e9, #2e7d32);
    color: white;
    font-size: 24px;
    cursor: pointer;
}


.seek-container {
    flex: 1;
}

.seek-bar {
    width: 100%;
}

.time {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.controls {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
}

.group {
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #eee;
    cursor: pointer;
}

.active {
    background: black;
    color: white;
}

.volume-box {
    margin-top: 30px;
    background: #eee;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.volume-box input {
    flex: 1;
}

</style>
</head>

<body>

<div class="player-container">

    <h1>Audio Player</h1>
    <div class="subtitle">My Audio Control Interface</div>

    <audio id="audio" src="your-audio-file.mp3"></audio>

    <div class="top">
        <button class="play-btn" onclick="togglePlay()">▶</button>

        <div class="seek-container">
            <div class="time">
                <span id="current">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <input type="range" id="seek" class="seek-bar" value="0">
            <div id="status">Paused · Speed: 1x · Loop Off</div>
        </div>
    </div>

    <div class="controls">

        <div class="group">
            <button onclick="skip(-15)">⏮ -15s</button>
            <button onclick="skip(15)">+15s ⏭</button>
        </div>

        <div class="group">
            <button onclick="setSpeed(0.75)">0.75x</button>
            <button class="active" onclick="setSpeed(1)">1x</button>
            <button onclick="setSpeed(1.25)">1.25x</button>
            <button onclick="setSpeed(1.5)">1.5x</button>
        </div>
    </div>

    <div class="controls">
        <div class="group">
            <button onclick="toggleMute()">🔊 Mute</button>
            <button onclick="toggleLoop()">🔁 Repeat</button>
        </div>
    </div>

    
    <div class="volume-box">
        🔊
        <input type="range" min="0" max="1" step="0.01" value="0.7" onchange="setVolume(this.value)">
        <span id="vol">70%</span>
    </div>

</div>

<script>
const audio = document.getElementById("audio");
const seek = document.getElementById("seek");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const status = document.getElementById("status");
const volText = document.getElementById("vol");

let isPlaying = false;
let loop = false;

function togglePlay() {
    if (audio.paused) {
        audio.play();
        isPlaying = true;
    } else {
        audio.pause();
        isPlaying = false;
    }
    updateStatus();
}

audio.addEventListener("timeupdate", () => {
    seek.value = (audio.currentTime / audio.duration) * 100 || 0;
    current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener("loadedmetadata", () => {
    duration.textContent = formatTime(audio.duration);
});

seek.addEventListener("input", () => {
    audio.currentTime = (seek.value / 100) * audio.duration;
});

function skip(sec) {
    audio.currentTime += sec;
}

function setVolume(val) {
    audio.volume = val;
    volText.textContent = Math.round(val * 100) + "%";
}

function setSpeed(speed) {
    audio.playbackRate = speed;

    document.querySelectorAll(".group button").forEach(btn => {
        if (btn.textContent.includes("x")) btn.classList.remove("active");
    });

    event.target.classList.add("active");
    updateStatus();
}

function toggleMute() {
    audio.muted = !audio.muted;
}

function toggleLoop() {
    loop = !loop;
    audio.loop = loop;
    updateStatus();
}

function updateStatus() {
    status.textContent =
        (audio.paused ? "Paused" : "Playing") +
        " · Speed: " + audio.playbackRate + "x" +
        " · Loop " + (loop ? "On" : "Off");
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
}
</script>

</body>
</html>
